services:
  - type: web
    name: srp-portfolio
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT server:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.10
      - key: DB_PATH
        value: /var/data/portfolio.db
    disk:
      name: portfolio-data
      mountPath: /var/data
      sizeGB: 1

